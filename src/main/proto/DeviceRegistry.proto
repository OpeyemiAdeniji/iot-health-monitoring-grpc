syntax = "proto3";

option java_multiple_files = true;
option java_package = "generated.grpc.deviceregistry";
option java_outer_classname = "DeviceRegistryImpl";

package deviceregistry;

service DeviceRegistryService {
  // registers a device into the monitoring system
  rpc RegisterDevice(DeviceInfo) returns (RegisterReply) {}

  // checks whether a device is registered - called by HealthMonitoringServer
  rpc CheckDevice(DeviceCheckRequest) returns (DeviceCheckReply) {}
}

message DeviceInfo {
  string deviceId = 1;
  string deviceType = 2;
}

message RegisterReply {
  bool success = 1;
  string message = 2;
}

message DeviceCheckRequest {
  string deviceId = 1;
}

message DeviceCheckReply {
  bool exists = 1;
  string message = 2;
}