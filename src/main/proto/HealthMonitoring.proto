syntax = "proto3";

option java_multiple_files = true;
option java_package = "generated.grpc.healthmonitoring";
option java_outer_classname = "HealthMonitoringImpl";

package healthmonitoring;

service HealthMonitoringService {
  // devices stream heartbeat signals to indicate they are alive
  rpc UploadHeartbeats(stream Heartbeat) returns (HeartbeatSummary) {}
  // client subscribes to receive continuous health updates
  rpc StreamHealth(HealthRequest) returns (stream HealthStatus) {}
}

message Heartbeat {
  string deviceId = 1; // identifier of the device sending the heartbeat
  int64 timestamp = 2; // time the heartbeat was generated
}

message HeartbeatSummary {
  int32 totalHeartbeats = 1; // number of heartbeat accepted
  int32 uniqueDevices = 2; // number of distinct devices
  int32 rejectedHeartbeats = 3; // heartbeats rejected due to unregistered devices
  string message = 4; // summary of what happened 
}

message HealthRequest {
  string groupId = 1; // identifier for the factory site being monitored
}

message HealthStatus {
  string deviceId = 1; // unique identifier of the device
  string state = 2; // status: OK, LATE or OFFLINE
}